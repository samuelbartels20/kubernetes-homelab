apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: onepassword-config-pvc
  namespace: default  # Update this to match your deployment namespace
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: openebs-hostpath  # Use default storage class or specify one
